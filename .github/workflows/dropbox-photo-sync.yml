name: Dropbox Photo Sync

on:
  schedule:
    - cron: "0 10,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dropbox-photo-sync
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    env:
      DROPBOX_INBOX_PATH: ${{ vars.DROPBOX_INBOX_PATH }}
      DROPBOX_ARCHIVE_PATH: ${{ vars.DROPBOX_ARCHIVE_PATH }}
      DROPBOX_QUARANTINE_PATH: ${{ vars.DROPBOX_QUARANTINE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install dependencies
        run: uv sync --frozen

      # Phase 1 only downloads files and records which Dropbox file became which
      # local staged file. The workflow decides archive vs quarantine later,
      # after ingest has classified each file.
      - name: Download Dropbox inbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: >-
          uv run python -m tooling.sync_dropbox_inbox
          download
          --staging-dir "$RUNNER_TEMP/dropbox-inbox"
          --dropbox-root "${DROPBOX_INBOX_PATH:-/site-photo-inbox}"
          --manifest "$RUNNER_TEMP/dropbox-download-manifest.json"

      - name: Ingest staged photos
        run: >-
          uv run python -m tooling.ingest_photos
          --src "$RUNNER_TEMP/dropbox-inbox"
          --result-manifest "$RUNNER_TEMP/dropbox-ingest-results.json"

      - name: Detect repository changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- content/images/photos content/pages)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.changes.outputs.has_changes == 'true'
        run: uv run pytest

      # This workflow publishes real content, so it should validate the
      # production site configuration before committing generated files.
      - name: Build production site
        if: steps.changes.outputs.has_changes == 'true'
        run: uv run pelican -s publishconf.py -t theme -o output

      - name: Commit synced photos
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/images/photos content/pages
          git diff --cached --quiet && exit 0
          git commit -m "Sync photos from Dropbox"
          git fetch origin main
          git rebase origin/main
          git push

      # Phase 2 finalizes Dropbox files only after the workflow has succeeded.
      # Accepted files go to archive; rejected files go to quarantine.
      - name: Finalize processed Dropbox files
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: >-
          uv run python -m tooling.sync_dropbox_inbox
          finalize
          --download-manifest "$RUNNER_TEMP/dropbox-download-manifest.json"
          --ingest-results "$RUNNER_TEMP/dropbox-ingest-results.json"
          --dropbox-root "${DROPBOX_INBOX_PATH:-/site-photo-inbox}"
          --archive-root "${DROPBOX_ARCHIVE_PATH:-/site-photo-archive}"
          --quarantine-root "${DROPBOX_QUARANTINE_PATH:-/site-photo-quarantine}"
