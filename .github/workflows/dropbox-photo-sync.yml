name: Dropbox Photo Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dropbox-photo-sync
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    env:
      DROPBOX_INBOX_PATH: ${{ vars.DROPBOX_INBOX_PATH }}
      DROPBOX_ARCHIVE_PATH: ${{ vars.DROPBOX_ARCHIVE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download Dropbox inbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: >-
          uv run python scripts/sync_dropbox_inbox.py
          --staging-dir "$RUNNER_TEMP/dropbox-inbox"
          --dropbox-root "${DROPBOX_INBOX_PATH:-/site-photo-inbox}"
          --archive-root "${DROPBOX_ARCHIVE_PATH:-/site-photo-archive}"

      - name: Ingest staged photos
        run: make ingest INGEST_SRC="$RUNNER_TEMP/dropbox-inbox"

      - name: Detect repository changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- content/images/photos content/pages)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.changes.outputs.has_changes == 'true'
        run: uv run pytest

      - name: Build site
        if: steps.changes.outputs.has_changes == 'true'
        run: uv run pelican -s pelicanconf.py -t theme -o output

      - name: Commit synced photos
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/images/photos content/pages
          git diff --cached --quiet && exit 0
          git commit -m "Sync photos from Dropbox"
          git push
